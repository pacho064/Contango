<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Contango Energy — Intelligence</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="brand">Contango Energy</div>
    <div class="nav-links">
      <a href="index.html" class="nav-a on">Overview</a>
      <a href="saudi-arabia.html" class="nav-a">Saudi Arabia</a>
      <a href="about.html" class="nav-a">About</a>
    </div>
    <div id="update-tag" style="font-family:var(--mono); font-size:9px; color:var(--ink-3)">Syncing...</div>
  </div>
</nav>

<div class="page-max">
  <div class="grid-main">
    <div class="col-left">
      <div id="map-container"><svg id="map-svg"></svg></div>
    </div>
    <div class="col-right">
      <div class="sidebar-head">Live Crude Feed</div>
      <div id="price-list"></div>
    </div>
  </div>
</div>

<section class="page-max feed-container">
  <div class="feed-col"><h2 class="feed-title">Daily Intel</h2><div id="intel-feed"></div></div>
  <div class="feed-col"><h2 class="feed-title">Infrastructure</h2><div id="infra-feed"></div></div>
  <div class="feed-col"><h2 class="feed-title">OPEC+ Quotas</h2><div id="opec-feed"></div></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="data.js"></script>

<script>
function renderUI() {
  const d = CONTANGO_DATA;
  document.getElementById('update-tag').textContent = "Last Update: " + d.lastUpdated;
  
  document.getElementById('price-list').innerHTML = d.prices.map(p => `
    <div class="price-row">
      <div><div class="p-name">${p.name}</div><div class="p-origin">${p.origin}</div></div>
      <div style="text-align:right"><div class="p-val">$${p.val.toFixed(2)}</div><div class="${p.chg >= 0 ? 'up' : 'down'}" style="font-size:11px">${p.chg}%</div></div>
    </div>`).join('');

  document.getElementById('intel-feed').innerHTML = d.intel.map(i => `<div class="intel-item"><div class="intel-hl">${i.hl}</div><div class="intel-txt">${i.txt}</div></div>`).join('');
  document.getElementById('infra-feed').innerHTML = d.infrastructure.map(i => `<div class="intel-item"><div class="intel-hl">${i.name}</div><div class="intel-txt">${i.desc}</div></div>`).join('');
  document.getElementById('opec-feed').innerHTML = d.opec.map(o => `<div class="intel-item"><div class="intel-hl">${o.nation}</div><div class="intel-txt">Actual: ${o.actual}M / Quota: ${o.quota}M</div></div>`).join('');
}

const svg = d3.select("#map-svg");
const projection = d3.geoMercator().center([45, 25]).scale(700);
const path = d3.geoPath().projection(projection);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
  svg.append("g").selectAll("path").data(topojson.feature(data, data.objects.countries).features).enter().append("path")
    .attr("d", path).attr("fill", d => d.id === "682" ? "var(--navy)" : "rgba(200,200,200,0.1)").attr("stroke", "var(--border)").attr("stroke-width", 0.5);
});

renderUI();
</script>
</body>
</html>
