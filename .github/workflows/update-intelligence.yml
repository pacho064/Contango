name: Update intelligence

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  update-intelligence:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run news updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_update.py

      - name: Commit and push if changed
        run: |
          git config user.name "Contango Bot"
          git config user.email "bot@contango-energy.noreply"
          git add data/events.json
          # Only commit if there's an actual change
          git diff --staged --quiet || git commit -m "events: auto-update $(date -u +%Y-%m-%d)"
          git push
