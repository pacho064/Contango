<script>
const GRADE_NAMES={arab_light:'Arab Light',murban:'Murban',basra_medium:'Basra Medium',kuwait_export:'Kuwait Export',arab_heavy:'Arab Heavy',oman_dubai:'Oman/Dubai'};

// Static map data — pipelines and flows don't change often enough to warrant JSON
const PIPELINES_DATA=[
  {n:'East-West (Petroline)',from:[50.2,26.7],to:[38.1,24.1],status:'disrupted',cap:'7M bbl/d — pumping station hit Apr 8'},
  {n:'ADCO Bypass (Fujairah)',from:[53.5,23.5],to:[56.4,25.1],status:'active',cap:'1.8M bbl/d — near capacity'},
  {n:'BTC Pipeline',from:[49.8,40.4],to:[35.9,36.6],status:'active',cap:'1.2M bbl/d'},
  {n:'Kirkuk-Ceyhan',from:[44.4,35.5],to:[35.9,36.6],status:'disrupted',cap:'1.6M bbl/d — attacked'},
  {n:'IPSA (inactive)',from:[46.3,30.5],to:[37.0,22.5],status:'inactive',cap:'1.65M bbl/d'},

const FLOWS_DATA=[

  {from:[56.4,25.1],to:[76,22],lbl:'Fujairah→India',vol:1.4,route:'Indian Ocean (bypass)'},
  {from:[55.0,55.0],to:[95,33],lbl:'Russia→China',vol:2.2,route:'ESPO Pipeline'},
  {from:[55.0,55.0],to:[76,22],lbl:'Russia→India',vol:1.6,route:'Indian Ocean (Cape)'},

// D = prices data (from prices.json, auto-updated daily)
// E = events/intelligence data (from events.json, manually updated)
let D=null, E=null, dark=false, activeLayer='base', map=null, mapLoaded=false;

function getPricesFallback(){
  return {
    benchmarks:{
      brent:{price:101.82,change_pct:3.1,updated:'2026-04-22',source:'EIA (RBRTE)'},
      wti:{price:92.96,change_pct:3.2,updated:'2026-04-22',source:'EIA (RWTC)'},
      oman_dubai:{price:80.75,change_pct:-0.4,updated:'2026-03-21',source:'OilPriceAPI / DME'},
      urals:{price:52.4,change_pct:-0.6,updated:'2026-03-21',source:'Argus'},
      ttf:{price:48.3,change_pct:0.4,updated:'2026-03-21',source:'ICE'},
      jkm:{price:24.7,change_pct:0.2,updated:'2026-03-21',source:'Platts'},
    },
    osps:{
      arab_light:{price:84.00,differential_vs_omd:2.50,spread_vs_brent:11.84,source:'Aramco OSP',for_month:'April 2026'},
      murban:{price:83.68,differential_vs_omd:2.93,spread_vs_brent:11.52,source:'ADNOC OSP',for_month:'April 2026'},
      basra_medium:{price:81.40,differential_vs_omd:0.65,spread_vs_brent:9.24,source:'SOMO',for_month:'April 2026'},
      kuwait_export:{price:80.95,differential_vs_omd:0.20,spread_vs_brent:8.79,source:'KPC',for_month:'April 2026'},

    },
    _updated:new Date().toISOString(),
  };
}

async function loadData(){
  const [pricesResult,eventsResult]=await Promise.allSettled([
    fetch('./data/prices.json?_='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}),
    fetch('./data/events.json?_='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  ]);
  D=pricesResult.status==='fulfilled'?pricesResult.value:getPricesFallback();
  if(pricesResult.status==='rejected') console.warn('prices.json failed, using fallback:',pricesResult.reason?.message);
  E=eventsResult.status==='fulfilled'?eventsResult.value:null;
  if(eventsResult.status==='rejected') console.warn('events.json failed:',eventsResult.reason?.message);
  render();
}

function render(){
  renderTicker();
  renderHero();
  renderCkBar();
  renderSpreads();
  renderPrices();
  renderCrisisTimeline();
  renderCrisisSide();
  renderChoke();
  renderPorts();
  renderOpec();
  if(D._updated){
    const d=new Date(D._updated);
    const el=document.getElementById('footer-updated');
    if(el) el.textContent='Prices: '+d.toUTCString().slice(5,16);
  }
}

function renderTicker(){
  if(!D) return;
  const b=D.benchmarks;
  const items=[
    b.brent&&{sym:'BRENT',p:b.brent.price,chg:b.brent.change_pct},
    b.wti&&{sym:'WTI',p:b.wti.price,chg:b.wti.change_pct},
    b.urals&&{sym:'URALS',p:b.urals.price,chg:b.urals.change_pct},
    b.ttf&&{sym:'TTF',p:b.ttf.price,chg:b.ttf.change_pct},
    b.jkm&&{sym:'JKM',p:b.jkm.price,chg:b.jkm.change_pct},
    ...Object.entries(D.osps||{}).map(([k,o])=>o&&o.price?{sym:(GRADE_NAMES[k]||k).split(' ').pop().toUpperCase(),p:o.price,spread:o.spread_vs_brent||0}:null),
  ].filter(Boolean);
  const html=items.map(i=>{
    const chg=i.chg!=null?`<span class="${i.chg>0?'tk-up':i.chg<0?'tk-dn':'tk-flat'}">${i.chg>=0?'+':''}${i.chg.toFixed(2)}%</span>`:`<span class="tk-flat">${i.spread>=0?'+':''}$${i.spread.toFixed(2)}</span>`;
    return `<div class="tk-item"><span class="tk-sym">${i.sym}</span><span class="tk-price">$${i.p.toFixed(2)}</span>${chg}</div>`;
  }).join('');
  const el=document.getElementById('tk-track');
  if(el) el.innerHTML=html+html;
}

function renderHero(){
  if(!D) return;
  const brent=D.benchmarks.brent.price;
  const arabl=D.osps.arab_light?.price||84.00;
  const spread=D.osps.arab_light?.spread_vs_brent||(arabl-brent);

  const ctx=document.getElementById('hero-ctx');if(ctx) ctx.textContent=`Arab Light $${arabl.toFixed(2)} · Brent $${brent.toFixed(2)}`;

  const hbd=document.getElementById('hero-brent-date');if(hbd) hbd.textContent=D.benchmarks.brent.updated;

  const hwd=document.getElementById('hero-wti-date');if(hwd) hwd.textContent=D.benchmarks.wti.updated;
  const hl=document.getElementById('hero-arabl');if(hl) hl.textContent='$'+arabl.toFixed(2);

function renderCkBar(){
  const data=E?E.chokepoints:[];
  const el=document.getElementById('ck-bar-inner');if(!el||!data.length) return;
  const rm={high:{cls:'ck-high',pulse:'ck-pulse-red',status:'Active threat'},moderate:{cls:'ck-mod',pulse:'ck-pulse-orange',status:'Elevated'},low:{cls:'',pulse:'',status:'Normal'}};

    const r=rm[c.risk]||rm.low;

function renderSpreads(){
  if(!D) return;
  const brent=D.benchmarks.brent.price;
  const ref=`<div class="sp"><div class="sp-label">ICE Brent</div><div class="sp-value">$${brent.toFixed(2)}</div><div class="sp-note">EIA · ${D.benchmarks.brent.updated}</div></div>`;
  const spreads=Object.entries(D.osps||{}).map(([k,o])=>{
    if(!o||!o.price) return '';
    const sp=o.spread_vs_brent||0;
    return `<div class="sp"><div class="sp-label">${GRADE_NAMES[k]||k} vs Brent</div><div class="sp-value ${sp>=0?'sp-pos':'sp-neg'}">${sp>=0?'+':''}$${sp.toFixed(2)}</div><div class="sp-note">${o.source||''} · ${o.for_month||''}</div></div>`;
  }).join('');
  const el=document.getElementById('ss-inner');if(el) el.innerHTML=ref+spreads;
}

function sparklineSVG(data,color){
  const W=52,H=22,pad=1;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=pad+(i/(data.length-1))*(W-pad*2);
    const y=H-pad-((v-min)/range)*(H-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last=pts.split(' ').pop().split(',');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${last[0]}" cy="${last[1]}" r="1.5" fill="${color}"/></svg>`;
}
function genHistory(cur,start,days=30){
  const arr=[];
  for(let i=0;i<days;i++){const t=i/(days-1),base=start+(cur-start)*t;arr.push(+(base+(Math.random()-.5)*cur*.008).toFixed(2));}
  arr[arr.length-1]=cur;return arr;
}

function renderPrices(){
  if(!D) return;
  const b=D.benchmarks;
  let h=`<div class="p-sec-head">Global benchmarks</div>`;
  [{sym:'Brent',key:'brent',start:73},{sym:'WTI',key:'wti',start:67},{sym:'TTF Gas',key:'ttf',start:44},{sym:'LNG JKM',key:'jkm',start:22},{sym:'Urals',key:'urals',start:48}].forEach(({sym,key,start})=>{
    const p=b[key];if(!p) return;
    const chg=p.change_pct||0;const up=chg>0,dn=chg<0;const sc=up?'#4a7c6f':dn?'#b33000':'#9a9590';
    h+=`<div class="p-row"><div><span class="p-name">${sym}</span><span class="p-sub">${p.source||''} · ${p.updated||''}</span></div><div><span class="p-price">$${p.price.toFixed(2)}</span><span class="p-chg ${up?'up':dn?'dn':'flat'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span></div><div class="p-spark">${sparklineSVG(genHistory(p.price,start),sc)}</div></div>`;
  });
  const ospEntries=Object.entries(D.osps||{}).filter(([k,o])=>o&&o.price);
  if(ospEntries.length){
    h+=`<div class="p-sec-head">ME OSPs — ${ospEntries[0][1].for_month||'current'}</div>`;
    ospEntries.forEach(([k,o])=>{
      const sp=o.spread_vs_brent||0;const hist=genHistory(o.price,o.price-Math.abs(sp)*0.6);
      h+=`<div class="p-row"><div><span class="p-name">${GRADE_NAMES[k]||k}</span><span class="p-spread">${sp>=0?'+':''}$${sp.toFixed(2)} vs Brent</span></div><div><span class="p-price">$${o.price.toFixed(2)}</span></div><div class="p-spark">${sparklineSVG(hist,'#b33000')}</div></div>`;
    });
    h+=`<div class="p-src-line">OSPs from NOC monthly releases · Indicative</div>`;
  }
  const pa=document.getElementById('prices-area');if(pa) pa.innerHTML=h;
  const ts=document.getElementById('prices-ts');if(ts) ts.textContent=b.brent?.updated||'—';
}

function renderCrisisTimeline(){
  const el=document.getElementById('crisis-timeline');if(!el) return;
  const data=E?E.timeline:[];
  if(!data.length){el.innerHTML='<div class="loading">Timeline loading…</div>';return;}
  el.innerHTML=data.map(e=>{
    const nums=e.numbers?`<div class="tl-numbers">${e.numbers.map(n=>`<div class="tl-num"><span class="tl-num-val">${n.val}</span><span class="tl-num-lbl">${n.lbl}</span></div>`).join('')}</div>`:'';
    const dotCls=e.type==='critical'?'tl-dot-red':e.type==='important'?'tl-dot-navy':'tl-dot-grey';
    return `<div class="tl-item ${e.type||''}"><div class="tl-date-col"><div class="tl-dot ${dotCls}"></div><div class="tl-date">${e.date}</div>${e.time?`<div class="tl-time">${e.time}</div>`:''}</div><div class="tl-content"><div class="tl-src">${e.src}</div><div class="tl-hl">${e.hl}</div><div class="tl-detail">${e.detail}</div>${nums}<div class="tl-src-line">${e.src}</div></div></div>`;
  }).join('');
}

  const el=document.getElementById('port-list');if(!el) return;

function renderOpec(){
  const el=document.getElementById('opec-rows');if(!el) return;

    const diff=o.q!==null?o.a-o.q:null;

  }).join('');

  if(src&&E) src.textContent=E.opec_src+' · '+E.opec_updated;
}

function initMap(){
  map=new maplibregl.Map({container:'map',style:dark?'https://tiles.openfreemap.org/styles/dark':'https://tiles.openfreemap.org/styles/liberty',center:[50,26],zoom:3.2,minZoom:1.5,maxZoom:14});
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');
  map.addControl(new maplibregl.ScaleControl({maxWidth:80,unit:'metric'}),'bottom-left');
  map.on('load',()=>{mapLoaded=true;addMapLayers();renderLegend();});
}

function arc(from,to,steps=40){
  const coords=[];
  for(let i=0;i<=steps;i++){
    const t=i/steps,lon=from[0]+(to[0]-from[0])*t,lat=from[1]+(to[1]-from[1])*t;
    const dist=Math.sqrt(Math.pow(to[0]-from[0],2)+Math.pow(to[1]-from[1],2));
    coords.push([lon,lat+Math.sin(Math.PI*t)*dist*.15]);
  }
  return coords;
}

function addMapLayers(){
  if(!mapLoaded) return;
  const portsForMap=E?E.ports:[];
  const ckForMap=E?E.chokepoints.map(c=>({...c,lon:c.map.lon,lat:c.map.lat})):[];

  if(!map.getSource('flows')){
    map.addSource('flows',{type:'geojson',data:{type:'FeatureCollection',features:FLOWS_DATA.map(f=>({type:'Feature',properties:{lbl:f.lbl,vol:f.vol,route:f.route},geometry:{type:'LineString',coordinates:arc(f.from,f.to)}}))}});
    map.addLayer({id:'flow-lines',type:'line',source:'flows',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#1d4480','line-width':['interpolate',['linear'],['get','vol'],0.5,1,2.5,3.5],'line-opacity':0.45,'line-dasharray':[3,2]}});
  }
  if(!map.getSource('pipelines')){
    map.addSource('pipelines',{type:'geojson',data:{type:'FeatureCollection',features:PIPELINES_DATA.map(p=>({type:'Feature',properties:{n:p.n,status:p.status,cap:p.cap},geometry:{type:'LineString',coordinates:[p.from,p.to]}}))}});
    map.addLayer({id:'pipe-lines',type:'line',source:'pipelines',paint:{'line-color':['case',['==',['get','status'],'active'],'#1d4480',['==',['get','status'],'disrupted'],'#8a5020','#666'],'line-width':2,'line-opacity':0.7,'line-dasharray':[4,2]}});
  }
  if(portsForMap.length&&!map.getSource('ports')){
    map.addSource('ports',{type:'geojson',data:{type:'FeatureCollection',features:portsForMap.map(p=>({type:'Feature',properties:{...p},geometry:{type:'Point',coordinates:[p.lon,p.lat]}}))}});
    map.addLayer({id:'port-dots',type:'circle',source:'ports',paint:{'circle-radius':['interpolate',['linear'],['get','cap'],0.4,4,3.5,7,6.5,10],'circle-color':['case',['==',['get','t'],'conflict'],'#c84000',['==',['get','t'],'strategic'],'#6a6660','#1d4480'],'circle-opacity':0.85,'circle-stroke-width':1.5,'circle-stroke-color':'rgba(255,255,255,0.6)'}});
    map.addLayer({id:'port-labels',type:'symbol',source:'ports',minzoom:4,layout:{'text-field':['get','n'],'text-font':['Open Sans Regular','Arial Unicode MS Regular'],'text-size':10,'text-offset':[0,1.2],'text-anchor':'top'},paint:{'text-color':'#444','text-halo-color':'rgba(255,255,255,.85)','text-halo-width':1.5}});
    map.on('click','port-dots',e=>{
      const p=e.features[0].properties;const util=p.util||0;
      const col=util>88?'#c84000':util<10?'#9a9590':'#4a9c8a';
      new maplibregl.Popup({closeButton:true,maxWidth:'220px'}).setLngLat(e.lngLat).setHTML(`<div class="popup-title">${p.n}</div><div class="popup-row"><span class="popup-l">Country</span><span class="popup-v">${p.c}</span></div><div class="popup-row"><span class="popup-l">Capacity</span><span class="popup-v">${p.cap}M bbl/d</span></div><div class="popup-row"><span class="popup-l">Utilisation</span><span class="popup-v" style="color:${col}">${util}%</span></div>`).addTo(map);
    });
    map.on('mouseenter','port-dots',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','port-dots',()=>map.getCanvas().style.cursor='');
  }
  if(ckForMap.length&&!map.getSource('chokepoints')){
    map.addSource('chokepoints',{type:'geojson',data:{type:'FeatureCollection',features:ckForMap.map(c=>({type:'Feature',properties:{name:c.name,risk:c.risk,volume:c.volume,source:c.source,updated:c.updated},geometry:{type:'Point',coordinates:[c.lon,c.lat]}}))}});
    map.addLayer({id:'ck-outer',type:'circle',source:'chokepoints',paint:{'circle-radius':14,'circle-color':'transparent','circle-stroke-width':1.5,'circle-stroke-color':['case',['==',['get','risk'],'high'],'#c84000','#8a7020'],'circle-opacity':0.5}});
    map.addLayer({id:'ck-dot',type:'circle',source:'chokepoints',paint:{'circle-radius':6,'circle-color':['case',['==',['get','risk'],'high'],'#c84000','#8a7020'],'circle-opacity':0.9,'circle-stroke-width':2,'circle-stroke-color':'rgba(255,255,255,.7)'}});
    map.addLayer({id:'ck-labels',type:'symbol',source:'chokepoints',layout:{'text-field':['get','name'],'text-font':['Open Sans Semibold','Arial Unicode MS Bold'],'text-size':10,'text-offset':[0,1.4],'text-anchor':'top'},paint:{'text-color':['case',['==',['get','risk'],'high'],'#b33000','#8a7020'],'text-halo-color':'rgba(255,255,255,.9)','text-halo-width':2}});
    map.on('click','ck-dot',e=>{
      const c=e.features[0].properties;const col=c.risk==='high'?'#c84000':'#8a7020';
      new maplibregl.Popup({closeButton:true,maxWidth:'220px'}).setLngLat(e.lngLat).setHTML(`<div class="popup-title">${c.name}</div><div class="popup-row"><span class="popup-l">Daily flow</span><span class="popup-v">${c.volume}</span></div><div class="popup-row"><span class="popup-l">Risk</span><span class="popup-v" style="color:${col}">${c.risk.toUpperCase()}</span></div><div style="margin-top:8px;font-size:10px;opacity:.55;line-height:1.5">${c.source} · ${c.updated}</div>`).addTo(map);
    });
    map.on('mouseenter','ck-dot',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','ck-dot',()=>map.getCanvas().style.cursor='');
  }
  updateLayerVis();
}

function updateLayerVis(){
  if(!mapLoaded) return;
  const show={'flow-lines':['base','flows'],'pipe-lines':['base','infra','ports'],'port-dots':['base','ports','infra'],'port-labels':['base','ports','infra'],'ck-outer':['base','risk','flows'],'ck-dot':['base','risk','flows'],'ck-labels':['base','risk']};
  Object.entries(show).forEach(([layer,on])=>{if(map.getLayer(layer)) map.setLayoutProperty(layer,'visibility',on.includes(activeLayer)?'visible':'none');});
  if(map.getLayer('flow-lines')){map.setPaintProperty('flow-lines','line-opacity',activeLayer==='flows'?0.7:0.25);map.setPaintProperty('flow-lines','line-width',activeLayer==='flows'?['interpolate',['linear'],['get','vol'],0.5,1.5,2.5,5]:['interpolate',['linear'],['get','vol'],0.5,0.5,2.5,1.5]);}
}
function setLayer(name){
  activeLayer=name;
  ['base','flows','ports','risk','infra'].forEach(l=>{const b=document.getElementById('lb-'+l);if(b){b.classList.toggle('on',l===name&&l!=='risk');b.classList.toggle('alert-on',l===name&&l==='risk');}});
  updateLayerVis();renderLegend();
}
function resetView(){map.flyTo({center:[50,26],zoom:3.2,duration:800});}
function renderLegend(){
  const el=document.getElementById('map-legend');if(!el) return;
  const defs={
    base:[{d:'rgba(200,178,108,.6)',l:'Producer'},{d:'rgba(179,48,0,.5)',l:'Conflict/shut'},{d:'#1d4480',l:'Active port'},{d:'#c84000',l:'Halted port'},{r:'#c84000',l:'Chokepoint HIGH'},{ll:'#1d4480',l:'Active flow'}],
    flows:[{ll:'#1d4480',l:'Active export flow'},{r:'#c84000',l:'Chokepoint'}],
    risk:[{d:'rgba(179,48,0,.5)',l:'High risk'},{d:'rgba(140,110,10,.5)',l:'Moderate'},{r:'#c84000',l:'Chokepoint HIGH'}],
    ports:[{d:'#1d4480',l:'Active port'},{d:'#c84000',l:'Halted'},{d:'#6a6660',l:'Strategic'}],
    infra:[{ll:'#1d4480',l:'Active pipeline'},{ll:'#8a5020',l:'Disrupted pipeline'}],
  };
  el.innerHTML=(defs[activeLayer]||defs.base).map(i=>{
    let ico='';
    if(i.d) ico=`<span class="leg-d" style="background:${i.d}"></span>`;
    if(i.ll) ico=`<span class="leg-l" style="background:${i.ll}"></span>`;
    if(i.r) ico=`<span class="leg-r" style="color:${i.r}"></span>`;
    return `<div class="leg">${ico}<span>${i.l}</span></div>`;
  }).join('');
}

let dark=localStorage.getItem('theme')==='dark';
function initTheme(){
  if(dark){document.documentElement.setAttribute('data-theme','dark');document.getElementById('theme-btn').textContent='Light';}
}
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'');
  document.getElementById('theme-btn').textContent=dark?'Light':'Dark';
  localStorage.setItem('theme',dark?'dark':'light');
  if(map){const c=map.getCenter(),z=map.getZoom();map.remove();mapLoaded=false;initMap();map.on('load',()=>{map.setCenter(c);map.setZoom(z);});}
}
function updateClock(){const el=document.getElementById('clk');if(el) el.textContent=new Date().toUTCString().slice(17,25)+' UTC';}
setInterval(updateClock,1000);updateClock();

document.addEventListener('DOMContentLoaded',()=>{
  initTheme();
  initMap();
  loadData();
  setInterval(loadData,60*60*1000);
});
</script>
